<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能抠图工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>智能抠图工具</h1>
            <p>一键抠图，轻松更换背景，美化图片</p>
        </header>

        <div class="main-content">
            <div class="upload-section">
                <h2>第一步：上传图片</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <p>点击或拖拽图片到此处上传</p>
                    <span class="upload-hint">支持 JPG、PNG、JPEG 格式</span>
                </div>
                <div class="image-preview" id="imagePreview" style="display: none;">
                    <img id="originalImage" alt="原图">
                    <button class="remove-btn" id="removeImage">×</button>
                </div>
            </div>

            <div class="options-section">
                <h2>第二步：选择功能</h2>
                
                <div class="option-group">
                    <label>抠图类型：</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="cutoutType" value="portrait" checked>
                            <span>人像抠图</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="cutoutType" value="general">
                            <span>通用抠图</span>
                        </label>
                    </div>
                </div>

                <div class="option-group">
                    <label>背景颜色：</label>
                    <div class="color-options">
                        <label class="color-option">
                            <input type="radio" name="bgColor" value="transparent" checked>
                            <div class="color-swatch transparent"></div>
                            <span>透明</span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="bgColor" value="white">
                            <div class="color-swatch white"></div>
                            <span>白色</span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="bgColor" value="blue">
                            <div class="color-swatch blue"></div>
                            <span>蓝色</span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="bgColor" value="red">
                            <div class="color-swatch red"></div>
                            <span>红色</span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="bgColor" value="custom">
                            <div class="color-swatch custom">
                                <input type="color" id="customColor" value="#00ff00">
                            </div>
                            <span>自定义</span>
                        </label>
                    </div>
                </div>

                <div class="option-group">
                    <label>美化选项：</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="brightness" value="brightness">
                            <span>亮度+</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="contrast" value="contrast">
                            <span>对比度+</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="sharpen" value="sharpen">
                            <span>锐化</span>
                        </label>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="tolerance">抠图精度：</label>
                    <input type="range" id="tolerance" min="0" max="100" value="30">
                    <span id="toleranceValue">30%</span>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="cutoutBtn" disabled>开始抠图</button>
                    <button class="btn btn-secondary" id="resetBtn" disabled>重置</button>
                </div>
            </div>

            <div class="result-section">
                <h2>第三步：查看结果</h2>
                <div class="result-placeholder" id="resultPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <p>抠图结果将在这里显示</p>
                    <span class="result-hint">右键点击图片可另存为</span>
                </div>
                <div class="result-container" id="resultContainer" style="display: none;">
                    <canvas id="resultCanvas"></canvas>
                    <div class="result-actions">
                        <button class="btn btn-primary" id="downloadBtn">下载图片</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="preset-section">
            <h2>快捷预设</h2>
            <div class="preset-cards">
                <div class="preset-card" data-preset="white-to-blue">
                    <div class="preset-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                    </div>
                    <h3>白底变蓝底</h3>
                    <p>证件照背景快速切换</p>
                </div>
                <div class="preset-card" data-preset="product-cutout">
                    <div class="preset-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                    </div>
                    <h3>商品抠图</h3>
                    <p>电商商品背景移除</p>
                </div>
                <div class="preset-card" data-preset="portrait-beautify">
                    <div class="preset-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <h3>人像美化</h3>
                    <p>智能优化人像照片</p>
                </div>
                <div class="preset-card" data-preset="transparent-bg">
                    <div class="preset-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                    </div>
                    <h3>透明背景</h3>
                    <p>移除背景保留主体</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>智能抠图工具 &copy; 2024 | 支持图片右键另存为</p>
        </footer>
    </div>

    <canvas id="tempCanvas" style="display: none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
